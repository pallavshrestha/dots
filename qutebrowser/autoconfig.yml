# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/master/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  bindings.commands:
    global:
      normal:
        ',M': hint links spawn umpv {hint-url}
        ',T': hint userscript all translate --text
        ',m': spawn umpv {url}
        ',t': hint userscript link translate
        ;M: hint --rapid links spawn umpv {hint-url}
        <Alt+Shift+t>: spawn --userscript translate --text
        <Alt+t>: spawn --userscript translate
        Alt+t: spawn --userscript translate
        cd: download-clear
        ch: history-clear
  colors.contextmenu.disabled.bg:
    global: '#2E3440'
  colors.contextmenu.disabled.fg:
    global: '#4C566A'
  colors.contextmenu.menu.bg:
    global: '#3B4252'
  colors.contextmenu.menu.fg:
    global: '#E5E9F0'
  colors.contextmenu.selected.bg:
    global: '#4C566A'
  colors.contextmenu.selected.fg:
    global: '#81A1C1'
  colors.webpage.bg:
    global: '#8fbcbb'
  colors.webpage.darkmode.algorithm:
    global: lightness-cielab
  colors.webpage.darkmode.enabled:
    global: false
  colors.webpage.darkmode.policy.page:
    global: smart
  colors.webpage.preferred_color_scheme:
    global: dark
  content.autoplay:
    global: false
  content.blocking.adblock.lists:
    global:
    - https://easylist.to/easylist/easylist.txt
    - https://easylist.to/easylist/easyprivacy.txt
  content.blocking.enabled:
    global: false
    rockpapershotgun.com: false
  content.blocking.hosts.block_subdomains:
    global: true
  content.blocking.method:
    global: both
  content.blocking.whitelist:
    global: null
  content.cookies.accept:
    global: all
  content.geolocation:
    https://www.gigantti.fi: false
  content.javascript.enabled:
    global: true
  content.notifications.enabled:
    https://calendar.google.com: false
    https://web.telegram.org: true
    https://www.aliexpress.com: false
    https://www.facebook.com: false
    https://www.reddit.com: false
    https://www.wcostream.com: false
    https://ymovies.to: false
  content.pdfjs:
    global: true
  content.register_protocol_handler:
    https://calendar.google.com?cid=%25s: false
    https://mail.google.com?extsrc=mailto&url=%25s: false
  editor.command:
    global:
    - xfce4-terminal
    - -e
    - vim
    - '{file}'
  editor.encoding:
    global: utf-8
  fileselect.folder.command:
    global:
    - xfce4-terminal
    - -e
    - ranger
    - --choosedir={}
  fileselect.multiple_files.command:
    global:
    - xfce4-terminal
    - -e
    - ranger
    - --choosefiles={}
  fileselect.single_file.command:
    global:
    - xfce4-terminal
    - -e
    - ranger
    - --choosefile={}
  spellcheck.languages:
    global:
    - en-US
  url.default_page:
    global: file:///home/pallav/.config/startpage/index.html
  url.start_pages:
    global: file:///home/pallav/.config/startpage/index.html
  window.transparent:
    global: false
  zoom.default:
    global: 100%
